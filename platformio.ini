; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
	mlesniew/PicoMQTT@^1.3.0
	bblanchon/ArduinoJson@^7.4.2
	fastled/FastLED@^3.10.3
	wifwaf/MH-Z19@^1.5.4
	adafruit/Adafruit SSD1306@^2.5.15
	adafruit/Adafruit GFX Library@^1.12.4
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
monitor_speed = 115200
build_flags = -DCORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO

; Uncomment to enable OTA updates over Wi-Fi
; upload_protocol = espota
; upload_port = 192.168.1.100  ; Replace with the actual IP address of your ESP32
; upload_flags =
;   --port=3232
;   --auth=<strong-ota-password-from-secrets.h>
